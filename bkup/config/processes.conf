# Process Manager Configuration
# Format: name:path:max_restarts:restart_delay_ms
#
# name             = short identifier for command-line use
# path             = absolute or relative path to executable
# max_restarts     = number of auto-restart attempts after crash (0 = disabled)
# restart_delay_ms = milliseconds to wait before restarting

sleeper:./test_programs/sleeper.out:3:2000
crasher:./test_programs/crasher.out:5:1500
printer:./test_programs/status_printer.out:2:1000
