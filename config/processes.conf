# Process Manager Configuration
# Format: name:path:max_restarts:restart_delay_ms:policy
#
# name             = short identifier for command-line use
# path             = absolute or relative path to executable
# max_restarts     = number of auto-restart attempts after crash (0 = disabled)
# restart_delay_ms = base milliseconds to wait before restarting (exponential backoff applied)
# policy           = always | on-failure | never
#
# policy=always:     restart on ANY exit (crash, signal, or clean exit)
# policy=on-failure: restart ONLY on non-zero exit or signal death
# policy=never:      never restart (run once)

sleeper:./test_programs/sleeper.out:3:2000:on-failure
crasher:./test_programs/crasher.out:5:1500:always
printer:./test_programs/status_printer.out:2:1000:on-failure
